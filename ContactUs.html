<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - RAGA Inc</title>
  <link rel="stylesheet" href="global.css">
  <script src="script.js" defer></script>
</head>

<body style="background-color: transparent;">
  <main class="page-container">
    <section id="contact">
      <h2>Contact Us</h2>
      <p style="text-align: center;">Get in touch with our team for support or inquiries.</p>

      <!-- Contact Information using Unordered List -->
      <ul style="max-width: 500px; margin: 0 auto 20px; text-align: center; list-style-type: none;">
        <li><strong>Email:</strong> support@ragainc.co.za</li>
        <li><strong>Phone:</strong> +27 71 551 3628</li>
        <li><strong>Social Menu:</strong> Follow us on <a href="https://www.instagram.com/ru.thriftyyy"
            target="_blank">Instagram</a> or <a href="https://youtube.com" target="_blank">YouTube</a></li>
      </ul>

      <!-- Contact Form -->
      <form class="marketplace-form" action="#" method="POST">
        <div class="form-group">
          <label for="contact-name">Name</label>
          <input type="text" id="contact-name" name="name" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="contact-email">Email</label>
          <input type="email" id="contact-email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" class="form-control" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn">Send Message</button>
      </form>
    </section>
  </main>
</body>

</html>
