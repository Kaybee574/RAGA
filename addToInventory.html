<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mainCss.css">
    <style>
        input
        {
            height: 30px;
            width: fit-content;
            padding: 10px;
        }
        .addItem

        }

        .addItem > *

            flex: 1;
        } 
        /*For the Add Pictures*/        
        .uploadBox
        {

            cursor: pointer;

        .uploadBox input
        {

        }   
        .myButton
        {
            display: flex;
            justify-content: center;
            gap: 20px;
        }     

        .category-card 
        {
            text-align: center;
            background-color: #f9f9f9;

        }

        .category-card:hover

        }

        {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        }



        .top {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .bottom
        {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
  
        .basicInfo
        {
            font-size: xx-large;
            display: grid;
            border: 1px solid black;
            border-radius: 2em;
            flex-wrap: wrap;
            padding: 20px;

            .textInfo {

                text-align: center;
            }
            .basicInfo1 img {
                margin: 0 auto;             /* center image if alone in row */
            }
            .edit-Infromation {
                margin: 0 auto;              /* center button when wrapped */
            }
        }

        @media screen and (max-width: 600px) {
            .moreDetails {
                justify-content: center;     /* center stat cards */
            }
            .stats {
                max-width: 100%;              /* take full width on small */
                width: 100%;
            }
            .basicInfo 
            {
                padding: 15px;
            }
            .basicInfo1 
            {
                flex-direction: column;       /* stack vertically on phones */
                
            }
        }
        html 
        {
            scroll-behavior: smooth;
        }     
        
        /* New styles for image preview section */
        .preview-container 
        {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 20px;
        }
        
        .preview-item {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 8px;

<!--this page wil have the links that will allow users to add their items that they
wish to sell on the website-->
<body>
  
  <header>
        <!-- THIS DESIGN WAS INFLUENCED BY THE SUPERBALIST WEBSITE, I REFERENCED THEIR HEADER -->
        <div class="myFoot">
            <div class="top">
              <h2>Raga</h2>
            </div>
            <div class="bottom">
                <p>Add a new item to your inventory</p>            
            </div>
        <div>
  </header>

    <main>
        <br>
        <p>Create a new Listing</p>
        <br>
        <h1>Item information</h1>
        <section class="basicInfo">
            <form id="listingForm" action="/submit-listing" method="post" enctype="multipart/form-data">

                <section class="addItem">
                    <label for="itemName">Item Name</label>
                        <input
                            type="text"
                            id="itemName"
                            name="itemName"
                            placeholder="Enter the name of your item"
                            required/>
                </section>

                <section class="addItem">
                    <label for="itemPrice">Price</label>
                        <input
                            type="number"
                            id="itemPrice"
                            name="itemPrice"
                            placeholder="Enter the price of the product"
                            min="0"
                            step="0.01"
                            required/>
                </section>

                <section class="addItem">
                    <label for="itemCondition">Condition</label>
                        <select id="itemCondition" name="itemCondition" required style="height: 50px; padding: 10px;">
                            <option value="">Select condition</option>
                            <option value="New">New</option>
                            <option value="Like New">Like New</option>
                            <option value="Excellent">Excellent</option>
                            <option value="Good">Good</option>
                            <option value="Fair">Fair</option>
                            <option value="Poor">Poor</option>
                        </select>
                </section>

                <section class="addItem">
                    <label for="itemComment">General Comments</label>
                        <textarea
                            id="itemComment"
                            name="itemComment"
                            placeholder="Enter additional information about the product"
                            rows="4"
                            style="width: 100%; padding: 10px;"
                            required></textarea>
                </section>
            </form>
            </section>

                <!-- Updated Image Upload Section -->
                <h1>Add Pictures</h1>
            <form id="listingForm" action="/submit-listing" method="post" enctype="multipart/form-data">
                <section class="basicInfo">
                    <label class="uploadBox">
                        Add Images
                        <input 
                            type="file" 
                            id="imageInput"
                            name="images" 
                            accept="image/*" 
                            multiple
                        >
                    </label>
                    
                    <!-- Image Preview Container -->
                    <div id="previewContainer" class="preview-container"></div>
                    
                    <!-- Hidden input to track selected files for form submission -->
                    <div id="fileDataContainer"></div>
                </section>

                <section class="myButton">

                    <button type="submit" class="submit-btn" id="submit-btn">Create Listing</button>
                    <button class="submit-btn" id="cancel-button">Cancel Listing</button>
                </section>
            </form>
        </section>    
    </main>

    <script>
    
    
        
        
        // Image preview and management functionality
        const imageInput = document.getElementById('imageInput');
        const previewContainer = document.getElementById('previewContainer');
        const fileDataContainer = document.getElementById('fileDataContainer');
        // Store files for form submission
        let selectedFiles = [];

        // Handle file selection
        imageInput.addEventListener('change', function(event) {
            const files = Array.from(event.target.files);
            
            // Validate file types and sizes
            const validFiles = files.filter(file => {
                const isValidType = file.type.startsWith('image/');
                const isValidSize = file.size <= 5 * 1024 * 1024; // 5MB max
                
                if (!isValidType) {
                    alert(`${file.name} is not an image file. Please select only images.`);
                    return false;
                }
                if (!isValidSize) {
                    alert(`${file.name} is too large. Maximum size is 5MB.`);
                    return false;
                }
                return true;
            });

            // Add valid files to selectedFiles array
            selectedFiles = [...selectedFiles, ...validFiles];
            
            // Display previews for all selected files
            displayPreviews();
            
            // Create hidden inputs for form submission
            updateFormData();
            
            // Clear the input so the same file can be selected again if needed
            imageInput.value = '';
        });

        // Display all image previews
        function displayPreviews() {
            previewContainer.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const previewItem = document.createElement('div');
                    previewItem.className = 'preview-item';
                    previewItem.dataset.index = index;
                    
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.alt = `Preview ${index + 1}`;
                    
                    const removeBtn = document.createElement('button');
                    removeBtn.className = 'remove-image';
                    removeBtn.innerHTML = '×';
                    removeBtn.onclick = function() {
                        removeImage(index);
                    };
                    
                    previewItem.appendChild(img);
                    previewItem.appendChild(removeBtn);
                    previewContainer.appendChild(previewItem);
                };
                
                reader.readAsDataURL(file);
            });
        }

        // Remove an image from selection
        function removeImage(index) {
            selectedFiles.splice(index, 1);
            displayPreviews();
            updateFormData();
        }

        // Update form data with selected files for submission
        function updateFormData() {
            // Clear previous hidden inputs
            fileDataContainer.innerHTML = '';
            
            // Create a DataTransfer object to handle files
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(file => {
                dataTransfer.items.add(file);
            });
            
            // Update the file input with all selected files
            imageInput.files = dataTransfer.files;
        }

        // Form submission handling
        document.getElementById('listingForm').addEventListener('submit', function(event) {
            // Validate that at least one image is selected
            if (selectedFiles.length === 0) {
                event.preventDefault();
                alert('Please select at least one image for your listing.');
                return;
            }
            
            // You can add additional validation here if needed
            console.log('Form submitted with', selectedFiles.length, 'images');
            
            // The form will submit normally with all files
        });

        // Optional: Preview existing form data before submission
        function previewFormData() {
            console.log('Item Name:', document.getElementById('itemName').value);
            console.log('Price:', document.getElementById('itemPrice').value);
            console.log('Condition:', document.getElementById('itemCondition').value);
            console.log('Comments:', document.getElementById('itemComment').value);
            console.log('Number of Images:', selectedFiles.length);
        }



        // HERE I AM JUST TRYING TO VALIDATE THESE BUTTONS
        const submitButton = document.getElementById("submit-btn");
        const cancelButton = document.getElementById("cancel-button");
        
        submitButton.onclick = function(event) 
        {
            event.preventDefault();
            if (confirm("Submit this form?")) 
            {
                alert("Submitted!");
                window.location.href = "sell.html";
            } 
            else 
            {
                alert("Cancelled");
                return false;
            }
        };
        
        cancelButton.onclick = function(event) 
        {
            event.preventDefault();
            // Okay so here this built in function stops the form from submitting before we exit
            if (confirm("Are you Sure you want to cancel?")) 
            {
                window.location.href = "sell.html";
            } 
            else 
            {
                alert(" Yoou can Continue Listing");
                return false;

            }
        };    
        ////////////////////////////////////////////////////////////////////////



    </script>
</body>
</html>
