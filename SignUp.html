<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - RAGA Inc</title>
    <link rel="stylesheet" href="global.css">
    <script src="script.js" defer></script>
</head>

<body style="background-color: transparent;">
    <!-- We ensure background is transparent so the root background color flows in -->
    <main class="page-container">
        <h2>Create Your Account</h2>
        <p style="text-align:center;">Join the RAGA Marketplace today!</p>

        <!-- Sign up form -->
        <form id="signup-form" class="marketplace-form" action="signup.php" method="POST" novalidate>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter Full Name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="student@campus.ru.ac.za"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <!-- HTML5 Validation: pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d]{8,}" -->
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Min 8 chars, 1 Uppercase, 1 Number" required>
            </div>

            <div class="form-group">
                <label for="user_type">User Type</label>
                <select name="user_type" id="user_type" class="form-control">
                    <option value="buyer">Buyer</option>
                    <option value="seller">Seller</option>
                    <option value="both">Both</option>
                </select>
            </div>

            <div id="signup-error" class="error-text"></div>

            <button type="submit" class="btn">Sign Up</button>

            <p style="text-align: center; margin-top: 20px;">
                Already have an account? <a href="SignIn.html">Sign In Here</a>
            </p>
        </form>
    </main>
</body>

</html>
