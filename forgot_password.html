<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - RAGA Inc</title>
    <link rel="stylesheet" href="global.css">
</head>

<body style="background-color: transparent;">
    <main class="page-container">
        <h2>Reset Password</h2>
        <p style="text-align:center;">Enter your email to receive recovery instructions.</p>

        <form class="marketplace-form" action="#" method="POST">
            <div class="form-group">
                <label for="recovery-email">Email Address</label>
                <input type="email" id="recovery-email" name="email" class="form-control" required
                    placeholder="name@ru.ac.za">
            </div>
            <button type="submit" class="btn">Send Recovery Email</button>

            <p style="text-align: center; margin-top: 20px;">
                Remember your password? <a href="SignIn.html">Sign In</a>
            </p>
        </form>
    </main>
</body>

</html>
