<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAGA Seller's Dashboard</title>
    <style>
      /* Reset and base */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background-color: white;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .profile-head {
        display: flex;
        background-color: rgb(246, 11, 11);
        align-items: center;
      }

      .seller-img {
        width: 88px;
        height: 88px;
        border-radius: 50%;
        object-fit: cover;
      }
      .sellerAvatar {
        padding: 1rem 1rem;
      }

      /* Side navigation styling */
      .content-wrapper {
        display: flex;
        flex: 1;
      }
      .dashboard-nav {
        /* min-height: calc(100vh - 106px); */

        background-color: aqua;
        width: 200px;
        flex-shrink: 0;
        padding-top: 1rem;
      }

      .dashboard-nav ul {
        list-style: none;
      }

      .dashboard-nav ul li a {
        color: black;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <!-- Container for profile head -->
    <div class="profile-head">
      <div class="sellerAvatar">
        <img class="seller-img" src="karabo.jpg" alt="Image of seller" />
        <h2 class="student-name">Karabo Mgwenya</h2>
        <p class="student-number">Student No.: <small>g24m5008</small></p>
      </div>
    </div>

    <!-- Navigation links Container -->
    <div class="content-wrapper">
      <aside>
        <nav class="dashboard-nav">
          <ul>
            <li>
              <a href="sell_dashboard.html">Dashboard</a>
            </li>
            <li>
              <a href="messagenger.html">Messages</a>
            </li>
            <li>
              <a href="Pending Orders.html">Pending Orders</a>
            </li>
            <li>
              <a href="Inventory.html">Inventory</a>
            </li>
            <li>
              <a href="Analytics.html">Analytics</a>
            </li>
          </ul>
        </nav>
      </aside>
    </div>
  </body>
</html>
