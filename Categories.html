        main

        .category-card img

            height: auto;
            max-width: 450px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;

        .category-card p

            font-weight: 500;
            margin-top: 10px;
        }

        /*Some more Responsive adjustments */
        @media screen and (max-width: 768px)

            h1 {
                font-size: 2rem;
                margin: 30px 0;
            }

            .category-card 
            {
                min-width: 250px;
            }

            .category-card p

            }

        @media screen and (max-width: 480px)

                margin: 20px 0;
            }

            .Categories 
            {

        }
