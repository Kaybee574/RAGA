<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - RAGA Inc</title>
    <link rel="stylesheet" href="global.css">
    <script src="script.js" defer></script>
</head>

<body style="background-color: transparent;">
    <!-- We ensure background is transparent so the root background color flows in -->
    <main class="page-container">
        <h2>Welcome Back to RAGA</h2>
        <p style="text-align:center;">Sign in to continue to the marketplace.</p>

        <form id="signin-form" class="marketplace-form" action="login.php" method="POST" novalidate>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="student@campus.ru.ac.za"
                    required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label for="user_type">User Type</label>
                <select name="user_type" id="user_type" class="form-control">
                    <option value="buyer">Buyer</option>
                    <option value="seller">Seller</option>
                </select>
            </div>

            <div id="signin-error" class="error-text"></div>

            <button type="submit" class="btn">Sign In</button>

            <div style="text-align: center; margin-top: 15px;">
                <a href="forgot_password.html" style="font-size: 0.9rem;">Forgot Password?</a>
            </div>

            <p style="text-align: center; margin-top: 20px;">
                Don't have an account? <a href="SignUp.html">Sign Up Here</a>
            </p>
        </form>
    </main>
</body>

</html>
