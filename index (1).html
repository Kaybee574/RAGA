<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RAGA Inc &copy;</title>
    <style>
      /* CSS Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
      }

      main,
      div {
        width: 100%;
        height: 100%;
      }
      .myframe {
        width: 100%;
        height: 8vh;
        border-color: black;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
      }

      .myMainFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
        overflow: hidden;
      }

      body {
        background-color: rgb(241, 189, 241);
      }
    </style>
  </head>

  <body>
    <main>
      <div>
        <iframe src="home.html" name="mainFrame" class="myMainFrame"> </iframe>
      </div>
    </main>
  </body>
</html>
